baseURL = 'https://lawtext.github.io/'
title = '中国法律法规在线文库'

# 语言设置
locale = "zh-cn"
defaultContentLanguage = "zh-cn"
defaultContentLanguageInSubdir = false
hasCJKLanguage = true
# enableEmoji = true
contentDir = "content/"
enableMissingTranslationPlaceholders = false
canonifyURLs = true

enableRobotsTXT = true
enableGitInfo = true

# Highlighting config
pygmentsCodeFences = true
pygmentsUseClasses = false
# Use the new Chroma Go highlighter in Hugo.
pygmentsUseClassic = false
#pygmentsOptions = "linenos=table"
# See https://help.farbox.com/pygments.html
pygmentsStyle = "tango"
# disableKinds = ["RSS"]
# Comment out to disable taxonomies in Docsy
# disableKinds = ["taxonomy"]

# hugo module configuration
[module]
[module.hugoVersion]
extended = true
min = "0.146.0"
[[module.imports]]
path = "github.com/google/docsy"
disable = false

# You can add your own taxonomies
[taxonomies]
tag = "tags"
category = "categories"
year = "years"
keyword = "keywords"

# Configure how URLs look like per section.
[permalinks]
blog = "/:section/:year/:month/:day/:slug/"

# Image processing configuration.
[imaging]
resampleFilter = "CatmullRom"
quality = 75
anchor = "Smart"

# Language configuration
# [languages]
# [languages.en]
# languageName ="English"
# title = "Goldydocs"
# contentDir = "content/fa"
# languageDirection = "rtl"
# [languages.en.params]
# description = "A Docsy example site"
# time_format_default = "2006.01.02"
# time_format_blog = "2006.01.02"

[markup]
[markup.goldmark]
[markup.goldmark.renderer]
unsafe = true
[markup.goldmark.parser.attribute]
block = true
[markup.goldmark.extensions]
[markup.goldmark.extensions.cjk]
eastAsianLineBreaks = true
eastAsianLineBreaksStyle = 'simple'
enable = true
escapedSpace = true
[markup.goldmark.extensions.passthrough.delimiters]
block = [ [ "\\[", "\\]" ], [ "$$", "$$" ] ]
inline = [ [ "\\(", "\\)" ] ]

[markup.highlight]
# See a complete list of available styles at https://xyproto.github.io/splash/docs/all.html
style = "tango"
# guessSyntax = true

# Comment out if you don't want the "print entire section" link enabled.
[outputs]
home = ['HTML']
page = ['HTML']
section = ["HTML"]

# Everything below this are Site Params
[params]
reading_speed = 400
defaultSource = "国家法律法规数据库"

# privacy_policy = "https://policies.google.com/privacy"
# Enable syntax highlighting and copy buttons on code blocks with Prism
# prism_syntax_highlighting = true

# First one is picked as the Twitter card image if not set on page.
# images = ["images/project-illustration.png"]
# version_menu = "Releases"
# archived_version = false
# version = "0.7.1"
# url_latest_version = "https://example.com"

# # Repository configuration (URLs for in-page links to opening issues and suggesting changes)
# github_repo = "https://github.com/google/docsy-example"
# github_project_repo = "https://github.com/google/docsy"
# github_subdir = ""
# github_branch= "main"

# Google Custom Search Engine ID. Remove or comment out to disable search.
# gcs_engine_id = ""

# Enable Lunr.js offline search
# offlineSearch = true
# offlineSearchSummaryLength = 200
# offlineSearchMaxResults = 25
[params.search.algolia]
indexName = "algolia_site_articles"
appId = "3X0X6KF7SS"
apiKey = "cd70b06ccd99eeeb94ebca076c1c0a98"

[params.copyright]
authors = "建站 [Hugo](https://gohugo.io/) | 主题 [Docsy](https://www.docsy.dev/)"
from_year = 2025
# to_year = "present"

# User interface configuration
[params.ui]
# breadcrumb_disable = false
# footer_about_enable = false
# navbar_logo = true
# navbar_translucent_over_cover_disable = false
showLightDarkModeMenu = true
sidebar_cache_limit = 1000
sidebar_menu_compact = true
sidebar_menu_foldable = true
sidebar_menu_truncate=2000
sidebar_search_disable = false
ul_show = 1

[params.ui.feedback]
enable = true
yes = '感谢支持，如有新需求请访问 🔗<a href="https://github.com/lawtext/laws/issues/new">提交Issue</a>。'
no = '很遗憾，如有问题请访问 🔗<a href="https://github.com/lawtext/laws/issues/new">提交Issue</a>。'

[params.ui.readingtime]
enable = true

[params.page]
pageSize = 50 # list页面每页项数

[params.taxonomy]
taxonomyCloud = ["categories", "tags", "years", "keywords"]
taxonomyCollapse = true
# taxonomyPageHeader = []

[params.taxonomy.taxonomyCloudTitleMap]
categories = "【分类】"
tags = "【标签】"
years = "【年份】"
keywords = "【关键词】"

[params.taxonomy.taxonomyAliasMap]
year = "年份"
years = "年份"
keyword = "关键词"
keywords = "关键词"

[params.statusClassMap]
"尚未生效" = "pending"
"有效" = "active"
"生效" = "active"
"已修改" = "amended"
"已修订" = "amended"
"已废止" = "repealed"
"废止或失效" = "repealed"
"未知" = "unknown"

